services:
  - type: web
    name: crowdsense-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TIDE_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: AQI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
